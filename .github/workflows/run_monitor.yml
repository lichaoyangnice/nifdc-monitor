name: NIFDC Website Monitor

on:
  schedule:
    # 北京时间每天早上 10:00 运行一次 (对应 UTC 时间 02:00)
    - cron: '0 2 * * *'
  workflow_dispatch: # 保持手动运行按钮

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开放写权限，否则无法 push 提交

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4

    - name: 运行监控脚本
      env:
        EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        echo "=== [1/3] 开始执行 Python 监控脚本 ==="
        
        # 2>&1 表示把错误信息和正常打印一起吐出来
        # tee output.log 表示既在控制台实时打印，又保存一份到文件供后面判断
        python -u monitor.py 2>&1 | tee output.log
        
        echo "=== [2/3] Python 脚本执行结束 ==="
        
        # 检查日志文件中是否有触发标识
        if grep -q "HAS_NEW_LOG=true" output.log; then
          echo "MAIL_SENT=true" >> $GITHUB_ENV
          echo "=== [3/3] 结果：检测到更新并成功发送邮件！ ==="
        else
          echo "=== [3/3] 结果：本次运行未检测到新期数，或脚本执行不完整。 ==="
        fi

    - name: 纯原生 Git 命令保活与数据同步
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 强制写入包含纳秒的时间戳，确保文件内容绝对和昨天不一样，100%产生变动
        echo "Last keep-alive sync: $(date -u '+%Y-%m-%d %H:%M:%S.%N UTC')" > keep_alive.txt
        git add keep_alive.txt
        
        if [ "${{ env.MAIL_SENT }}" = "true" ]; then
          git add send_log.json
          COMMIT_MSG="Update send_log & Keep-alive sync"
        else
          COMMIT_MSG="Keep-alive sync (Prevent workflow dormancy)"
        fi
        
        # 使用 || true 兜底，哪怕没有任何变动，Git 也会优雅通过，绝不让工作流报错变红
        git commit -m "$COMMIT_MSG" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref_name }}
