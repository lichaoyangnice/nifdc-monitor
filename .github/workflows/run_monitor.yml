name: NIFDC Website Monitor

on:
  schedule:
    # 北京时间每天早上 10:00 运行一次 (对应 UTC 时间 02:00)
    - cron: '0 2 * * *'
  workflow_dispatch: # 保持手动运行按钮

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开放写权限，否则无法 push 提交

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4

    - name: 运行监控脚本
      env:
        EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        # 使用 python -u 强制刷新缓冲区，确保 print 内容实时打印
        python -u monitor.py > output.log
        
        # 打印完整的检索报告到 GitHub 控制台，让你一眼就能看到结果
        echo "=== 中检院网站检索报告开始 ==="
        cat output.log
        echo "=== 中检院网站检索报告结束 ==="
        
        if grep -q "HAS_NEW_LOG=true" output.log; then
          echo "MAIL_SENT=true" >> $GITHUB_ENV
        fi

    - name: 纯原生 Git 命令保活与数据同步
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 强制写入包含纳秒的时间戳，确保文件内容绝对和昨天不一样，100%产生变动
        echo "Last keep-alive sync: $(date -u '+%Y-%m-%d %H:%M:%S.%N UTC')" > keep_alive.txt
        git add keep_alive.txt
        
        if [ "${{ env.MAIL_SENT }}" = "true" ]; then
          git add send_log.json
          COMMIT_MSG="Update send_log & Keep-alive sync"
        else
          COMMIT_MSG="Keep-alive sync (Prevent workflow dormancy)"
        fi
        
        # 使用 || true 兜底，哪怕没有任何变动，Git 也会优雅通过，绝不让工作流报错变红
        git commit -m "$COMMIT_MSG" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref_name }}
