name: NIFDC Website Monitor

on:
  schedule:
    # 北京时间每天早上 10:00 运行一次 (对应 UTC 时间 02:00)
    - cron: '0 2 * * *'
  workflow_dispatch: # 保持手动运行按钮

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开放写权限，否则无法 push 提交

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4

    - name: 运行监控脚本
      env:
        EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        python monitor.py > output.log
        cat output.log
        # 判断是否发送了新邮件
        if grep -q "HAS_NEW_LOG=true" output.log; then
          echo "MAIL_SENT=true" >> $GITHUB_ENV
        fi

    - name: 纯原生 Git 命令保活与数据同步
      run: |
        # 1. 配置 Git 机器人身份
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 2. 无论是否发送邮件，都强制向保活文件写入当前时间戳（相当于你说的提交空格保活）
        echo "Last keep-alive sync: $(date -u '[%Y-%m-%d %H:%M:%S UTC]')" > keep_alive.txt
        git add keep_alive.txt
        
        # 3. 如果 Python 脚本更新了日志（发了邮件），把日志也一起带上
        if [ "${{ env.MAIL_SENT }}" = "true" ]; then
          git add send_log.json
          COMMIT_MSG="Update send_log & Keep-alive sync"
        else
          COMMIT_MSG="Keep-alive sync (Prevent workflow dormancy)"
        fi
        
        # 4. 执行原生提交并推送
        git commit -m "$COMMIT_MSG"
        git push origin HEAD:${{ github.ref_name }}
